<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" role="img" aria-label="shikisaiのアーキテクチャ図" color="#768390">
  <title>shikisaiのアーキテクチャ</title>
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .accent-box { fill: none; stroke: #5a9bd4; stroke-width: 1.5; }
    .label { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: currentColor; }
    .small { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: currentColor; }
    .accent-label { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #5a9bd4; }
    .arrow { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#head); }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" fill="currentColor"/>
    </marker>
  </defs>

  <rect x="20" y="60" width="150" height="100" rx="8" class="box"/>
  <text x="40" y="90" class="label">ベースカラー</text>
  <text x="40" y="114" class="small">HEX入力 / ピッカー</text>

  <rect x="230" y="60" width="180" height="100" rx="8" class="accent-box"/>
  <text x="250" y="88" class="accent-label">color(OKLCH)</text>
  <text x="250" y="112" class="small">sRGBとの相互変換</text>
  <text x="250" y="130" class="small">色域外の彩度切り詰め</text>

  <rect x="470" y="20" width="180" height="80" rx="8" class="box"/>
  <text x="490" y="48" class="label">palette</text>
  <text x="490" y="72" class="small">トーンスケール10段</text>
  <text x="490" y="90" class="small">ライト・ダークトークン</text>

  <rect x="470" y="120" width="180" height="80" rx="8" class="box"/>
  <text x="490" y="148" class="label">contrast</text>
  <text x="490" y="172" class="small">WCAG比とAA/AAA判定</text>

  <rect x="710" y="60" width="130" height="100" rx="8" class="box"/>
  <text x="730" y="90" class="label">出力</text>
  <text x="730" y="114" class="small">プレビュー</text>
  <text x="730" y="132" class="small">CSS変数 / JSON</text>

  <path class="arrow" d="M170 110 H222"/>
  <path class="arrow" d="M410 110 H462 V64"/>
  <path class="arrow" d="M410 110 H462 V156"/>
  <path class="arrow" d="M650 60 H702 V96"/>
  <path class="arrow" d="M650 160 H702 V124"/>
</svg>
