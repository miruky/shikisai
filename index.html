<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WCAGコントラスト検証つきのカラーパレット生成器。ベースカラー1色からトーンスケールとライト・ダーク両テーマを同時に設計する。"
    />
    <meta name="theme-color" content="#f5f3ee" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15140f" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..600&display=swap"
      rel="stylesheet"
    />
    <title>shikisai — カラーパレット生成器</title>
    <script>
      // 描画前にテーマを確定させ、初回ロードのちらつきを防ぐ
      try {
        const t = localStorage.getItem('shikisai:theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
